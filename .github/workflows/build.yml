name: Build PIDsim Installers

on:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            type: DEB
          - os: windows-latest
            type: EXE
          - os: macos-latest
            type: DMG

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg-dev rpm

      - name: Build with Maven
        working-directory: pid-motor-sim
        run: mvn -B clean package -Djpackage.type=${{ matrix.type }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PIDsim-${{ matrix.os }}
          path: pid-motor-sim/target/installer/**
